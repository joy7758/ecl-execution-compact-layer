name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run synthetic trace-corpus evaluation
        run: python experiments/evaluate_trace_corpus.py

      - name: Run negative validation-matrix evaluation
        run: python experiments/evaluate_validation_matrix.py

      - name: Run mapping coverage evaluation
        run: python experiments/evaluate_mapping_coverage.py

      - name: Run JOSS gate verifier
        run: python scripts/joss_gate_verifier.py

      - name: Run external action queue verifier
        run: python scripts/verify_external_action_queue.py

      - name: Run external action evidence intake validator
        run: python scripts/validate_external_action_evidence_intake.py
